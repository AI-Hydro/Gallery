name: Build Gallery API

on:
  push:
    branches: [main]
    paths:
      - 'items/**'
      - 'scripts/build_gallery_api.py'
      - '.github/workflows/build-api.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Gallery API from manifests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/build_gallery_api.py

      - name: Commit generated API files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/gallery.json api/contributors.json api/reputation.json
          if git diff --staged --quiet; then
            echo "No catalog changes"
          else
            git commit -m "chore: regenerate api/gallery.json [skip ci]"
            git push
          fi

  deploy-pages:
    needs: build-api
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
